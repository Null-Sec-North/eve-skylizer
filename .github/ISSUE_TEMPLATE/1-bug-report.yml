name: Bug report
description: Report a reproducible defect or regression in skŸlizer.
title: "[Bug]: "
labels:
  - bug
  - triage
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a problem. Search existing issues before submitting a duplicate.

        Do not include EVE SSO secrets, OAuth tokens, ESI tokens, database credentials, private corporation data, or other sensitive information.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Provide a concise description of the defect.
      placeholder: Structure fuel deadlines are displayed one hour early.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Select the component most closely related to the problem.
      options:
        - Installation or deployment
        - Authentication or EVE SSO
        - ESI integration
        - Moon-scan import or analysis
        - Directional-scanner import
        - Probe-scanner or anomaly import
        - Structure management
        - Mining ledgers
        - Database or migration
        - Permissions or administration
        - User interface
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: skŸlizer version or commit
      description: Enter the release tag, branch, or full commit hash.
      placeholder: v2.4.5, main, or 0123456789abcdef...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Describe the environment in which the problem occurs.
      placeholder: |
        Operating system: Ubuntu 24.04 LTS
        Deployment method: Docker Compose / native
        PHP: 8.4.x
        MariaDB: 12.3.x
        Web server: Apache 2.4.x / NGINX
        Browser: Firefox 140
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: Explain what actually happens, including exact error messages where available.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: Explain what should happen instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the smallest repeatable sequence that demonstrates the defect.
      placeholder: |
        1. Sign in with EVE SSO.
        2. Open the Structures dashboard.
        3. Select a refinery with an active extraction.
        4. Observe the displayed deadline.
    validations:
      required: true

  - type: textarea
    id: sample_data
    attributes:
      label: Sanitized sample data
      description: Provide the minimum non-sensitive scan or configuration data required to reproduce the problem.
      render: text
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste sanitized application, PHP, web-server, or database logs. Remove all secrets and private data.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add screenshots, related issues, suspected regressions, or other useful details.
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: Submission checklist
      options:
        - label: I searched existing issues and discussions for the same problem.
          required: true
        - label: I removed credentials, tokens, private corporation data, and other sensitive information.
          required: true
        - label: I included sufficient information to reproduce or investigate the problem.
          required: true
