# Use this only when Apache serves the static site directly. When NGINX is the
# public frontend, apply caching and compression in NGINX instead to avoid
# duplicate work. PHP-FPM is not required for these static assets.

<Directory "/var/www/skylizer/current">
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted

    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresDefault "access plus 30 days"
        ExpiresByType text/html "access plus 0 seconds"
        ExpiresByType image/svg+xml "access plus 7 days"
    </IfModule>

    <IfModule mod_headers.c>
        <FilesMatch "\.html$">
            Header set Cache-Control "public, max-age=0, must-revalidate"
        </FilesMatch>
        <FilesMatch "(\.[0-9a-f]{8,64}|-[A-Za-z0-9_-]{8,64})\.(avif|css|gif|ico|jpe?g|js|mjs|png|svg|webp|woff2?)$">
            Header set Cache-Control "public, max-age=31536000, immutable"
        </FilesMatch>
    </IfModule>

    <IfModule mod_brotli.c>
        AddOutputFilterByType BROTLI_COMPRESS application/javascript application/json application/manifest+json application/wasm application/xml image/svg+xml text/css text/html text/javascript text/plain text/xml
    </IfModule>

    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE application/javascript application/json application/manifest+json application/wasm application/xml image/svg+xml text/css text/html text/javascript text/plain text/xml
    </IfModule>
</Directory>
